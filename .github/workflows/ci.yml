name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — keeps integration tests honest

jobs:
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - run: go build ./...
      - run: go vet ./...

  test:
    name: Unit tests (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.25"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Run unit tests
        run: go test -short -race -count=1 ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Only on push to main and the daily schedule — never blocks PRs.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run integration tests
        run: go test -race -count=1 -timeout 120s ./...
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
